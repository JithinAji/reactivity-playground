<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8" />
      <title>Reactivity Playground</title>

      <style>
            html,
            body {
                  height: 100%;
                  overflow: hidden;
            }

            body {
                  margin: 0;
                  font-family: Inter, system-ui, Arial, sans-serif;
                  background: #eef2f7;
                  color: #222;
            }

            /* Header */
            .header {
                  padding: 16px 20px;
                  background: linear-gradient(90deg, #2b8dbd, #4cafef);
                  color: white;
            }

            .header h1 {
                  margin: 0;
                  font-size: 20px;
            }

            .header p {
                  margin: 4px 0 0;
                  font-size: 13px;
                  opacity: 0.9;
            }

            /* Layout */
            .container {
                  display: flex;
                  height: calc(100vh - 70px);
                  overflow: hidden;
            }

            .panel {
                  flex: 1;
                  padding: 20px;
                  box-sizing: border-box;
                  overflow: hidden;

                  /* 🔥 critical fix */
                  display: flex;
                  flex-direction: column;
            }

            .panel.left {
                  border-right: 1px solid #d0d7e2;
                  background: #f8fafc;
            }

            /* Tabs */
            .tabs {
                  display: flex;
                  gap: 8px;
                  margin-bottom: 16px;
            }

            .tab {
                  padding: 8px 14px;
                  cursor: pointer;
                  border-radius: 6px;
                  font-size: 14px;
                  background: #e2e8f0;
                  transition: all 0.2s ease;
            }

            .tab:hover {
                  background: #cbd5e1;
            }

            .tab.active {
                  background: #4cafef;
                  color: white;
                  font-weight: 500;
            }

            /* Code Panel */
            .box {
                  flex: 1;
                  background: white;
                  border-radius: 10px;
                  padding: 16px;
                  display: flex;
                  flex-direction: column;
                  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
                  overflow: hidden;
            }

            .code-title {
                  font-size: 18px;
                  font-weight: 600;
                  margin-bottom: 8px;
            }

            #codeTitle {
                  font-size: 16px;
                  font-weight: 600;
            }

            #codeExplanation {
                  font-size: 13px;
                  color: #555;
                  margin-bottom: 8px;
            }

            #codeFlow {
                  font-size: 12px;
                  padding: 6px 10px;
                  background: #eef6ff;
                  border-left: 3px solid #4cafef;
                  border-radius: 4px;
                  margin-bottom: 10px;
                  color: #2563eb;
            }

            .code-desc {
                  flex: 1;
                  overflow-y: auto;
                  background: #0f172a;
                  color: #e2e8f0;
                  border-radius: 6px;
                  padding: 12px;
                  font-family: monospace;
                  font-size: 13px;
                  white-space: pre;
            }

            /* Right panel scroll container */
            .preview {
                  display: flex;
                  flex-direction: column;
                  gap: 14px;

                  /* 🔥 actual scroll */
                  overflow-y: auto;
                  flex: 1;
            }

            /* Property card */
            .property-card {
                  display: flex;
                  flex-direction: column;
                  gap: 12px;
                  padding: 14px;
                  border-radius: 10px;
                  background: white;
                  border: 1px solid #e2e8f0;
                  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
            }

            /* Input */
            .input-group {
                  display: flex;
                  flex-direction: column;
                  gap: 6px;
            }

            .input-group label {
                  font-size: 11px;
                  text-transform: uppercase;
                  color: #64748b;
                  letter-spacing: 0.5px;
            }

            .input-group input {
                  padding: 10px;
                  font-size: 14px;
                  border-radius: 6px;
                  border: 1px solid #cbd5e1;
                  background: white;
            }

            .input-group input:focus {
                  outline: none;
                  border-color: #4cafef;
                  box-shadow: 0 0 0 2px rgba(76, 175, 239, 0.2);
            }

            /* Outputs */
            .outputs {
                  display: flex;
                  flex-direction: column;
                  gap: 8px;
            }

            .row {
                  display: flex;
                  align-items: center;
                  gap: 10px;
            }

            .label {
                  width: 60px;
                  font-size: 12px;
                  color: #64748b;
                  font-weight: 500;
            }

            .output {
                  display: inline-block;
                  min-width: 90px;
                  padding: 4px 8px;
                  border-radius: 6px;
                  border: 1px solid #d1d5db;
                  background: #f1f5f9;
                  font-family: monospace;
                  font-size: 12px;
            }

            /* Button */
            button {
                  margin-top: 12px;
                  padding: 8px 14px;
                  border-radius: 8px;
                  border: none;
                  background: #4cafef;
                  color: white;
                  font-weight: 500;
                  cursor: pointer;
                  transition: all 0.2s ease;
                  width: fit-content;
            }

            button:hover {
                  background: #3b8edb;
                  transform: translateY(-1px);
            }
      </style>
</head>

<body>

      <div class="header">
            <h1>Reactivity Playground</h1>
            <p>Manual vs Object.defineProperty vs Proxy</p>
      </div>

      <div class="container">

            <!-- LEFT -->
            <div class="panel left">

                  <div class="tabs">
                        <div class="tab active" data-mode="manual">Manual</div>
                        <div class="tab" data-mode="define">Object.define</div>
                        <div class="tab" data-mode="proxy">Proxy</div>
                  </div>

                  <div class="box">
                        <div class="code-title">Code Viewer</div>
                        <div id="codeTitle"></div>
                        <div id="codeExplanation"></div>
                        <div id="codeFlow"></div>
                        <div class="code-desc" id="codeDisplay"></div>
                  </div>

            </div>

            <!-- RIGHT -->
            <div class="panel">

                  <div class="box preview">

                        <div class="property-card">
                              <div class="input-group">
                                    <label for="sharedInput">Value</label>
                                    <input id="sharedInput" placeholder="Type something..." />
                              </div>

                              <div class="outputs">
                                    <div class="row">
                                          <span class="label">Manual</span>
                                          <span class="output" id="manualOutput"></span>
                                    </div>

                                    <div class="row">
                                          <span class="label">Define</span>
                                          <span class="output" id="defineOutput"></span>
                                    </div>

                                    <div class="row">
                                          <span class="label">Proxy</span>
                                          <span class="output" id="proxyOutput"></span>
                                    </div>
                              </div>
                        </div>

                  </div>

                  <button id="addProperty">+ Add Property</button>

            </div>

      </div>

      <script type="module" src="./main.js"></script>

</body>

</html>
