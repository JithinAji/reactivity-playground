<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8" />
      <title>Reactivity Playground</title>

      <style>
            html,
            body {
                  height: 100%;
                  overflow: hidden;
            }

            body {
                  margin: 0;
                  font-family: Inter, system-ui, Arial, sans-serif;
                  background: #eef2f7;
                  color: #222;
            }

            /* Header */
            .header {
                  padding: 16px 20px;
                  background: linear-gradient(90deg, #2b8dbd, #4cafef);
                  color: white;
            }

            .header h1 {
                  margin: 0;
                  font-size: 20px;
            }

            .header p {
                  margin: 4px 0 0;
                  font-size: 13px;
                  opacity: 0.9;
            }

            /* Layout */
            .container {
                  display: flex;
                  height: calc(100vh - 70px);
                  overflow: hidden;
            }

            .panel {
                  flex: 1;
                  padding: 20px;
                  box-sizing: border-box;
                  overflow: hidden;
            }

            .panel.left {
                  display: flex;
                  flex-direction: column;
                  border-right: 1px solid #d0d7e2;
                  background: #f8fafc;
                  overflow: hidden;
            }

            /* Tabs */
            .tabs {
                  display: flex;
                  gap: 8px;
                  margin-bottom: 16px;
            }

            .tab {
                  padding: 8px 14px;
                  cursor: pointer;
                  border-radius: 6px;
                  font-size: 14px;
                  background: #e2e8f0;
                  transition: all 0.2s ease;
            }

            .tab:hover {
                  background: #cbd5e1;
            }

            .tab.active {
                  background: #4cafef;
                  color: white;
                  font-weight: 500;
            }

            /* Code Card */
            .box {
                  flex: 1;
                  background: white;
                  border-radius: 10px;
                  padding: 16px;
                  display: flex;
                  flex-direction: column;
                  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
                  overflow: hidden;
            }

            .code-title {
                  font-size: 18px;
                  font-weight: 600;
                  margin-bottom: 8px;
            }

            #codeTitle {
                  font-size: 16px;
                  font-weight: 600;
                  margin-bottom: 4px;
            }

            #codeExplanation {
                  font-size: 13px;
                  color: #555;
                  margin-bottom: 8px;
            }

            #codeFlow {
                  font-size: 12px;
                  padding: 6px 10px;
                  background: #eef6ff;
                  border-left: 3px solid #4cafef;
                  border-radius: 4px;
                  margin-bottom: 10px;
                  color: #2563eb;
            }

            .code-desc {
                  flex: 1;
                  overflow-y: auto;
                  background: #0f172a;
                  color: #e2e8f0;
                  border-radius: 6px;
                  padding: 12px;
                  font-family: monospace;
                  font-size: 13px;
                  line-height: 1.5;
                  white-space: pre;
            }

            /* Right panel */
            .preview {
                  display: flex;
                  flex-direction: column;
                  gap: 14px;
                  overflow-y: auto;
            }

            input {
                  padding: 10px;
                  font-size: 15px;
                  border-radius: 6px;
                  border: 1px solid #ccc;
            }

            button {
                  padding: 8px 12px;
                  border-radius: 6px;
                  border: none;
                  background: #4cafef;
                  color: white;
                  cursor: pointer;
            }

            button:hover {
                  background: #3b8edb;
            }

            .output {
                  border-radius: 6px;
                  border: 1px solid #ddd;
                  padding: 10px;
                  background: #fafafa;
                  font-family: monospace;
            }

            strong {
                  font-size: 13px;
                  color: #333;
            }
      </style>
</head>

<body>

      <!-- HEADER -->
      <div class="header">
            <h1>Reactivity Playground</h1>
            <p>Manual vs Object.defineProperty vs Proxy</p>
      </div>

      <div class="container">

            <!-- LEFT PANEL -->
            <div class="panel left">

                  <div class="tabs">
                        <div class="tab active" data-mode="manual">Manual</div>
                        <div class="tab" data-mode="define">Object.define</div>
                        <div class="tab" data-mode="proxy">Proxy</div>
                  </div>

                  <div class="box">
                        <div class="code-title">Code Viewer</div>

                        <div id="codeTitle"></div>
                        <div id="codeExplanation"></div>
                        <div id="codeFlow"></div>

                        <div class="code-desc" id="codeDisplay"></div>
                  </div>

            </div>

            <!-- RIGHT PANEL -->
            <div class="panel">

                  <div class="box preview">

                        <input id="sharedInput" placeholder="Type something..." />

                        <button id="addProperty">Add Property</button>

                        <div>
                              <strong>Manual:</strong>
                              <div class="output" id="manualOutput"></div>
                        </div>

                        <div>
                              <strong>Define:</strong>
                              <div class="output" id="defineOutput"></div>
                        </div>

                        <div>
                              <strong>Proxy:</strong>
                              <div class="output" id="proxyOutput"></div>
                        </div>

                  </div>

            </div>

      </div>

      <script type="module" src="./main.js"></script>

</body>

</html>
